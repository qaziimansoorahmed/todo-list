<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List — Mansoor Ahmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Space Mono', monospace;
      padding: 2rem 1rem;
      color: #f0f0f0;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .header h1 span { color: #ff3c3c; }
    .date-box {
      text-align: right;
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.6;
    }
    .date-box .day {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: #222;
    }
    .stats-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .stat-pill {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      padding: 4px 12px;
      border: 1px solid #1a1a1a;
    }
    .stat-pill span { color: #ff3c3c; font-weight: 700; }

    /* Input */
    .input-area {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid #222;
    }
    .task-input {
      flex: 1;
      background: #111;
      border: none;
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 1rem 1.25rem;
      outline: none;
      transition: background 0.2s;
    }
    .task-input::placeholder { color: #333; }
    .task-input:focus { background: #141414; }
    .add-btn {
      background: #ff3c3c;
      border: none;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 0 1.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: #e02828; }
    .add-btn:active { transform: scale(0.95); }

    /* Filters */
    .filters {
      display: flex;
      gap: 1px;
      margin-bottom: 1.5rem;
      background: #1a1a1a;
      border: 1px solid #1a1a1a;
    }
    .filter-btn {
      flex: 1;
      background: #111;
      border: none;
      color: #444;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { color: #f0f0f0; background: #161616; }
    .filter-btn.active { background: #1a1a1a; color: #ff3c3c; }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 1px; }

    .task-item {
      background: #111;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.25rem;
      border: 1px solid transparent;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.25s ease;
    }
    .task-item:hover { background: #141414; border-color: #1e1e1e; }
    .task-item.completed { opacity: 0.45; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-check {
      width: 20px; height: 20px;
      border: 1.5px solid #333;
      border-radius: 2px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-size: 11px;
      color: transparent;
    }
    .task-item.completed .task-check {
      background: #ff3c3c;
      border-color: #ff3c3c;
      color: #fff;
    }
    .task-check:hover { border-color: #ff3c3c; }

    .task-text {
      flex: 1;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #f0f0f0;
      word-break: break-word;
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #444;
    }

    .task-time {
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .task-delete {
      background: none;
      border: none;
      color: #2a2a2a;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .task-item:hover .task-delete { color: #555; }
    .task-delete:hover { color: #ff3c3c !important; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      border: 1px dashed #1a1a1a;
    }
    .empty-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    .empty p {
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #1a1a1a;
    }
    .bottom-bar p {
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.08em;
    }
    .clear-btn {
      background: none;
      border: 1px solid #1a1a1a;
      color: #444;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: #ff3c3c; color: #ff3c3c; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 1.5rem;
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .progress-top span { color: #ff3c3c; }
    .progress-bar-bg {
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #ff3c3c;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Label */
    .built-by {
      text-align: center;
      font-size: 0.6rem;
      color: #222;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2rem;
    }
    .built-by span { color: #ff3c3c; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1>My<br>Tasks<span>.</span></h1>
      <div class="date-box">
        <div class="day" id="day-num"></div>
        <div id="month-year"></div>
        <div id="weekday"></div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-pill">Total <span id="total-count">0</span></div>
      <div class="stat-pill">Done <span id="done-count">0</span></div>
      <div class="stat-pill">Left <span id="left-count">0</span></div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-top">
      <span>Progress</span>
      <span id="pct-label">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input class="task-input" id="task-input" type="text" placeholder="Add a new task..." maxlength="120"/>
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Done</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="task-list"></div>

  <!-- Empty State -->
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">✓</div>
    <p>No tasks here — add one above</p>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <p>Built with HTML · CSS · JS</p>
    <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
  </div>

  <p class="built-by">By <span>Mansoor Ahmed</span> — Ghotki, Pakistan</p>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('ma-tasks') || '[]');
  let filter = 'all';

  // Date display
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('day-num').textContent = now.getDate();
  document.getElementById('month-year').textContent = months[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('weekday').textContent = days[now.getDay()];

  function save() {
    localStorage.setItem('ma-tasks', JSON.stringify(tasks));
  }

  function getTime() {
    const d = new Date();
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, completed: false, time: getTime() });
    input.value = '';
    save();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.completed = !t.completed;
    save(); render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');

    const filtered = tasks.filter(t => {
      if (filter === 'active') return !t.completed;
      if (filter === 'completed') return t.completed;
      return true;
    });

    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const left = total - done;
    const pct = total === 0 ? 0 : Math.round(done / total * 100);

    document.getElementById('total-count').textContent = total;
    document.getElementById('done-count').textContent = done;
    document.getElementById('left-count').textContent = left;
    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.completed ? 'completed' : ''}" id="task-${t.id}">
        <div class="task-check" onclick="toggleTask(${t.id})">${t.completed ? '✓' : ''}</div>
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-time">${t.time}</div>
        <button class="task-delete" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key to add
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
